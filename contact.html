<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | PLUME & STITCH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">PLUME & STITCH</a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="Shop.html">Shop</a>
      <a href="About.html">About</a>
      <a href="Contact.html" class="active">Contact</a>
    </nav>
    <button id="cart-toggle" class="cart-toggle" type="button">Cart <span id="cart-count">0</span></button>
  </header>

  <main>
    <section class="section-block contact-layout">
      <div>
        <h1>Contact PLUME & STITCH</h1>
        <p>Need sizing support, order help, or bulk t-shirt pricing? Send us a message.</p>
        <p>Email: Gokul@plume&stitch.store</p>
        <p>Phone: +91 90000 12345</p>
      </div>
      <form id="contact-form" class="contact-form">
        <label for="contact-name">Name</label>
        <input id="contact-name" name="name" type="text" required>

        <label for="contact-email">Email</label>
        <input id="contact-email" name="email" type="email" required>

        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="5" required></textarea>

        <button class="btn btn-primary" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <aside id="cart-panel" class="cart-panel" aria-hidden="true">
    <div class="cart-head">
      <h3>Your Cart</h3>
      <button id="close-cart" class="icon-btn" type="button">X</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <p>Total: <strong id="cart-total">INR 0</strong></p>
      <button id="checkout-btn" class="btn btn-primary" type="button">Checkout</button>
    </div>
  </aside>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <footer class="site-footer">
    <p>2026 PLUME & STITCH. Built for comfort. Designed for statement.</p>
  </footer>

  <script src="Script.js"></script>
</body>
</html>
